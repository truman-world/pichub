name: Deploy Laravel App to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP with Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, fileinfo, pdo, pdo_pgsql
          tools: composer

      - name: Copy .env.example
        # 这一步确保了即使没有 .env 文件，Laravel也能找到配置模板
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Composer Dependencies
        # 我们在这里忽略平台要求，以避免在某些构建环境中出现问题
        run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs

      - name: Prepare .env file for deployment
        run: |
          echo "APP_NAME=PicHub" > .env
          echo "APP_ENV=production" >> .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_URL=http://8.148.7.13" >> .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

      - name: Create Deployment Package
        run: tar -zcf deploy.tar.gz --exclude-from='.gitignore' .

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/www/wwwroot/8.148.7.13"

      - name: Run Deployment Commands on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13
            tar -zxf deploy.tar.gz
            rm deploy.tar.gz
            
            export PATH=/www/server/php/82/bin:$PATH

            # --- 核心修复：在这里执行Laravel的收尾工作 ---
            # 运行数据库迁移
            php artisan migrate --force

            # 优化配置和路由缓存
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # 设置正确的文件权限
            chown -R www:www .
            chmod -R 755 storage bootstrap/cache

            echo "✅ Deployment successful!"
