# .github/workflows/deploy.yml

name: Build and Deploy to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      # --- 核心修复点 ---
      # 将安装和构建步骤分开，并在构建步骤中注入所需的环境变量
      - name: Install Dependencies
        run: npm install

      - name: Build Project
        # 使用 env 关键字，将 GitHub Secrets 注入到构建环境中
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }} # 建议将所有需要的 secrets 都注入
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }} # 同上
        run: npm run build
        
      - name: Create Deployment Package
        run: tar -zcf deploy.tar.gz .next node_modules package.json prisma public

      - name: Add remote host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy Package to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/www/wwwroot/8.148.7.13"

      - name: Unpack, Sync DB, and Restart App
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13
            
            # 明确指定 Node.js 的路径
            export PATH=/www/server/nodejs/v18.20.8/bin:$PATH
            
            # 清理旧文件
            shopt -s extglob
            rm -rf !(.env.local|deploy.tar.gz)
            echo "✅ Old files cleaned up."

            # 解压缩新的代码包
            tar -zxf deploy.tar.gz
            rm deploy.tar.gz
            echo "✅ New package unpacked."

            # --- 关键新增步骤：自动同步数据库结构 ---
            # 它会读取 .env.local 和 prisma/schema.prisma 来更新数据库
            # --accept-data-loss 标志用于在非交互式脚本中自动确认，适用于开发阶段
            npx prisma db push --accept-data-loss
            echo "✅ Database schema synchronized."

            # 生成 Prisma Client
            npx prisma generate
            echo "✅ Prisma Client generated on server."
            
            # 使用 PM2 启动或重启应用
            PM2_BIN=/www/server/nodejs/v18.20.8/bin/pm2
            NEXT_BIN=./node_modules/.bin/next

            $PM2_BIN delete pichub || true
            $PM2_BIN start $NEXT_BIN --name "pichub" -- start
            $PM2_BIN save
            echo "✅ Application restarted successfully!"
