# .github/workflows/deploy.yml

name: Build and Deploy to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies for Build
        run: npm install

      - name: Build Project
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.local
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.local
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.local
          export NODE_OPTIONS=--max-old-space-size=4096 && npm run build
      
      # --- 关键修复：自动将您的服务器添加到信任列表 ---
      - name: Add remote host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Clean old files on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ -d /www/wwwroot/8.148.7.13 ]; then
              cd /www/wwwroot/8.148.7.13
              chattr -i .user.ini || true
              rm -rf ./* .??*
              echo "✅ Old files cleaned up."
            else
              echo "✅ Directory does not exist, creating now..."
              mkdir -p /www/wwwroot/8.148.7.13
            fi

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next, package.json, package-lock.json, public"
          target: "/www/wwwroot/8.148.7.13"

      - name: Install Dependencies and Restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13
            
            # --- 关键修复：修复服务器环境并安装依赖 ---
            # 明确指定 Node.js 的路径，并将其加入到本次会话的环境变量中
            export PATH=/www/server/nodejs/v18.20.8/bin:$PATH
            # 现在，npm install 命令一定会成功
            npm install --production
            
            # 直接在服务器上创建 .env.local 文件
            echo "DATABASE_URL='${{ secrets.DATABASE_URL }}'" > .env.local
            echo "JWT_SECRET='${{ secrets.JWT_SECRET }}'" >> .env.local
            echo "NEXTAUTH_URL='${{ secrets.NEXTAUTH_URL }}'" >> .env.local
            echo "✅ Runtime .env.local file created."

            # 定义 next 命令的准确相对路径
            NEXT_BIN=./node_modules/.bin/next

            # 先删除旧的同名进程（如果有的话），`|| true` 可以防止在进程不存在时报错
            pm2 delete pichub || true
            # 启动新的进程
            pm2 start $NEXT_BIN --name "pichub" -- start
            # 保存进程列表，以便服务器重启后能自动恢复
            pm2 save
