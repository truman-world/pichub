# .github/workflows/deploy.yml

name: Build and Deploy Next.js App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env

      - name: Build Project
        run: npm run build
        
      - name: Create Deployment Package
        run: |
          # 打包标准Next.js项目所需的所有文件
          tar -zcf deploy.tar.gz .next public package.json package-lock.json ecosystem.config.js .env prisma

      - name: Deploy Package to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/www/wwwroot/8.148.7.13"

      - name: Unpack, Sync DB, and Restart App
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13
            
            if [ ! -f deploy.tar.gz ]; then
              echo "❌ Deployment package not found! Aborting."
              exit 1
            fi

            # 先安装依赖，再解压覆盖
            export PATH=/www/server/nodejs/v18.20.8/bin:$PATH
            npm install --production

            tar -zxf deploy.tar.gz
            rm deploy.tar.gz
            echo "✅ New package unpacked."
            
            npx prisma db push --schema=./prisma/schema.prisma --accept-data-loss
            echo "✅ Database schema synchronized."
            
            # --- 核心修复：使用 ecosystem 文件来启动应用 ---
            PM2_BIN=/www/server/nodejs/v18.20.8/bin/pm2
            
            $PM2_BIN startOrRestart ecosystem.config.js
            $PM2_BIN save
            echo "✅ Application started/restarted successfully via ecosystem file!"
