# .github/workflows/deploy.yml

name: Build and Deploy to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        run: npm run build
        
      # --- 核心修复点 ---
      # 重新将 public 目录添加到部署包中，以包含 favicon.ico 等静态文件
      - name: Create Deployment Package
        run: tar -zcf deploy.tar.gz .next node_modules package.json prisma public

      - name: Add remote host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy Package to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/www/wwwroot/8.148.7.13"

      - name: Unpack, Sync DB, and Restart App
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13
            
            export PATH=/www/server/nodejs/v18.20.8/bin:$PATH
            
            shopt -s extglob
            rm -rf !(.env.local|deploy.tar.gz)
            echo "✅ Old files cleaned up."

            tar -zxf deploy.tar.gz
            rm deploy.tar.gz
            echo "✅ New package unpacked."

            npx prisma db push --accept-data-loss
            echo "✅ Database schema synchronized."

            npx prisma generate
            echo "✅ Prisma Client generated on server."
            
            PM2_BIN=/www/server/nodejs/v18.20.8/bin/pm2
            NEXT_BIN=./node_modules/.bin/next

            $PM2_BIN delete pichub || true
            $PM2_BIN start $NEXT_BIN --name "pichub" -- start
            $PM2_BIN save
            echo "✅ Application restarted successfully!"
