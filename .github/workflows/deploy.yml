# .github/workflows/deploy.yml

name: Build and Deploy to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      # 1. 在 GitHub 的高性能服务器上完成所有耗时操作
      - name: Install All Dependencies & Build Project
        run: |
          npm install
          npm run build
      
      # 新增步骤: 将构建产物和依赖打包成一个文件
      - name: Create Deployment Package
        # 关键修复: 移除了 "public" 目录，因为它在您的项目中不存在
        run: tar -zcf deploy.tar.gz .next node_modules package.json prisma

      - name: Add remote host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      # 2. 将单个打包文件传送到您的服务器 (更稳定可靠)
      - name: Deploy Package to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/www/wwwroot/8.148.7.13"

      # 3. 在您的服务器上解压并执行极速重启脚本
      - name: Unpack, Generate Prisma Client, and Restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13
            
            # 明确指定 Node.js 的路径
            export PATH=/www/server/nodejs/v18.20.8/bin:$PATH
            
            # 清理旧文件 (保留 .env.local 和新的压缩包)
            shopt -s extglob
            rm -rf !(.env.local|deploy.tar.gz)
            echo "✅ Old files cleaned up."

            # 解压缩新的代码包
            tar -zxf deploy.tar.gz
            rm deploy.tar.gz
            echo "✅ New package unpacked."

            # 生成 Prisma Client (这个过程非常快)
            # 它会自动读取您在服务器上创建的 .env.local 文件
            npx prisma generate
            echo "✅ Prisma Client generated on server."
            
            # 使用 PM2 启动或重启应用
            PM2_BIN=/www/server/nodejs/v18.20.8/bin/pm2
            NEXT_BIN=./node_modules/.bin/next

            $PM2_BIN delete pichub || true
            $PM2_BIN start $NEXT_BIN --name "pichub" -- start
            $PM2_BIN save
            echo "✅ Application restarted successfully!"
