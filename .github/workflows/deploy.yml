# .github/workflows/deploy.yml

name: Build and Deploy Standalone App to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      # --- 诊断步骤 1：检查文件是否存在且内容正确 ---
      - name: Verify next.config.mjs
        run: |
          echo "--- Listing files in root directory: ---"
          ls -la
          echo "--- Content of next.config.mjs: ---"
          cat next.config.mjs
          echo "------------------------------------"

      - name: Install Dependencies
        run: npm install

      - name: Build Standalone Project
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        run: npm run build

      # --- 诊断步骤 2：检查构建输出 ---
      - name: Check Build Output
        run: |
          echo "--- Listing content of .next directory after build: ---"
          ls -la .next/
          echo "--------------------------------------------------------"
        
      - name: Create Deployment Package
        run: |
          mkdir -p deploy
          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/. deploy/
          else
            echo "Error: .next/standalone directory not found after build."
            exit 1
          fi
          if [ -d ".next/static" ]; then
            cp -r .next/static deploy/
          fi
          if [ -d "public" ]; then
            cp -r public deploy/
          fi
          cp package.json deploy/
          mkdir -p deploy/prisma
          cp prisma/schema.prisma deploy/prisma/

          cd deploy
          tar -zcf ../deploy.tar.gz .

      - name: Deploy Package to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/www/wwwroot/8.148.7.13"

      - name: Unpack, Sync DB, and Restart App
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13
            
            if [ ! -f deploy.tar.gz ]; then
              echo "❌ Deployment package not found! Aborting."
              exit 1
            fi

            tar -zxf deploy.tar.gz
            rm deploy.tar.gz
            echo "✅ New package unpacked."
            
            export PATH=/www/server/nodejs/v18.20.8/bin:$PATH
            
            npx prisma db push --schema=./prisma/schema.prisma --accept-data-loss
            echo "✅ Database schema synchronized."
            
            PM2_BIN=/www/server/nodejs/v18.20.8/bin/pm2
            
            $PM2_BIN delete pichub || true
            $PM2_BIN start server.js --name "pichub" --env.PORT=3000
            $PM2_BIN save
            echo "✅ Application restarted/started successfully!"
