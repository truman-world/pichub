# .github/workflows/deploy.yml

name: Build and Deploy Standalone App to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env

      - name: Build Standalone Project
        run: npm run build
        
      - name: Create Deployment Package
        run: |
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          if [ -d "public" ]; then
            cp -r public deploy/public
          fi
          cp .env deploy/
          mkdir -p deploy/prisma
          cp prisma/schema.prisma deploy/prisma/
          cd deploy
          tar -zcf ../deploy.tar.gz .

      - name: Deploy Package to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/www/wwwroot/8.148.7.13"

      - name: Unpack, Sync DB, and Restart App
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13
            
            if [ ! -f deploy.tar.gz ]; then
              echo "❌ Deployment package not found! Aborting."
              exit 1
            fi

            tar -zxf deploy.tar.gz
            rm deploy.tar.gz
            echo "✅ New package unpacked."
            
            # --- 核心修复：在 server.js 顶部自动注入 dotenv 配置 ---
            # 这确保了应用在启动时就能加载 .env 文件
            sed -i "1s;^;require('dotenv').config();\n;" server.js
            echo "✅ Patched server.js with dotenv."

            export PATH=/www/server/nodejs/v18.20.8/bin:$PATH
            
            # 现在这个命令可以找到 DATABASE_URL 了，因为它被 dotenv 加载了
            npx prisma db push --schema=./prisma/schema.prisma --accept-data-loss
            echo "✅ Database schema synchronized."
            
            PM2_BIN=/www/server/nodejs/v18.20.8/bin/pm2
            
            $PM2_BIN delete pichub || true
            $PM2_BIN start server.js --name "pichub"
            $PM2_BIN save
            echo "✅ Application restarted/started successfully!"
