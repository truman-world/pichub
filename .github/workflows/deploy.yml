# .github/workflows/deploy.yml

name: Build and Deploy to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies for Build
        run: npm install

      - name: Build Project
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.local
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.local
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.local
          npm run build
      
      - name: Add remote host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Clean old files on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /www/wwwroot/8.148.7.13
            cd /www/wwwroot/8.148.7.13
            chattr -i .user.ini || true
            rm -rf ./* .??*
            echo "✅ Old files cleaned up."

      - name: Deploy Application Code
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next, package.json, package-lock.json, public, prisma"
          target: "/www/wwwroot/8.148.7.13"
    
      - name: Install Dependencies and Restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13
            
            # 明确指定 Node.js 的路径
            export PATH=/www/server/nodejs/v18.20.8/bin:$PATH
            # 安装生产依赖 (现在会包含 prisma)
            npm install --production
            
            # --- 关键修复：在服务器上生成 Prisma Client ---
            npx prisma generate
            
            # 直接在服务器上创建 .env.local 文件
            echo "DATABASE_URL='${{ secrets.DATABASE_URL }}'" > .env.local
            echo "JWT_SECRET='${{ secrets.JWT_SECRET }}'" >> .env.local
            echo "NEXTAUTH_URL='${{ secrets.NEXTAUTH_URL }}'" >> .env.local
            echo "✅ Runtime .env.local file created."

            PM2_BIN=/www/server/nodejs/v18.20.8/bin/pm2
            NEXT_BIN=./node_modules/.bin/next

            $PM2_BIN delete pichub || true
            $PM2_BIN start $NEXT_BIN --name "pichub" -- start
            $PM2_BIN save
