# .github/workflows/deploy.yml

name: Build and Deploy Standalone App to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Standalone Project
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        run: npm run build
        
      - name: Create Deployment Package
        run: |
          mkdir -p deploy
          if [ ! -d ".next/standalone" ]; then
            echo "❌ Error: .next/standalone directory not found after build."
            exit 1
          fi
          
          echo "✅ Copying files to deploy directory..."
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/
          if [ -d "public" ]; then
            cp -r public deploy/
          fi
          cp package.json deploy/
          mkdir -p deploy/prisma
          cp prisma/schema.prisma deploy/prisma/

          echo "✅ Creating tarball..."
          cd deploy
          tar -zcf ../deploy.tar.gz .
          cd ..
          
          # --- 诊断步骤 1: 确认部署包已在构建环境中创建 ---
          echo "--- Verifying deployment package in runner: ---"
          ls -lh deploy.tar.gz
          echo "---------------------------------------------"

      - name: Deploy Package to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/www/wwwroot/8.148.7.13"

      - name: Unpack, Sync DB, and Restart App
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13
            
            # --- 诊断步骤 2: 确认部署包已到达服务器 ---
            echo "--- Verifying deployment package on server: ---"
            ls -lh
            echo "---------------------------------------------"

            if [ ! -f deploy.tar.gz ]; then
              echo "❌ Deployment package deploy.tar.gz not found on server! Aborting."
              exit 1
            fi

            echo "✅ Unpacking new package..."
            tar -zxf deploy.tar.gz
            rm deploy.tar.gz
            
            echo "✅ Setting up Node.js environment..."
            export PATH=/www/server/nodejs/v18.20.8/bin:$PATH
            
            echo "✅ Synchronizing database schema..."
            npx prisma db push --schema=./prisma/schema.prisma --accept-data-loss
            
            echo "✅ Restarting application with PM2..."
            PM2_BIN=/www/server/nodejs/v18.20.8/bin/pm2
            
            $PM2_BIN delete pichub || true
            $PM2_BIN start server.js --name "pichub" --env.PORT=3000
            $PM2_BIN save
            echo "✅ Application restarted/started successfully!"
