name: Build and Deploy to Aliyun ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.local
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.local
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.local
          export NODE_OPTIONS=--max-old-space-size=4096 && npm run build

      - name: Clean Server Directory (Remove old files)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🧹 Cleaning server directory..."
            rm -rf /www/wwwroot/8.148.7.13/*

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next, package.json, public, node_modules"
          target: "/www/wwwroot/8.148.7.13"
          strip_components: 1

      - name: Setup .env.local and Restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/wwwroot/8.148.7.13

            # 重新创建 .env.local 文件
            echo 'DATABASE_URL="${{ secrets.DATABASE_URL }}"' > .env.local
            echo 'JWT_SECRET="${{ secrets.JWT_SECRET }}"' >> .env.local
            echo 'NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}"' >> .env.local
            echo "✅ .env.local created on server."

            # 定义 PM2 路径
            PM2_PATH=/www/server/nodejs/v18.20.8/bin/pm2
            NEXT_BIN=./node_modules/.bin/next

            npm i -g pm2

            # 重启 PM2 应用
            $PM2_PATH delete pichub || true
            $PM2_PATH start $NEXT_BIN --name "pichub" -- start
            $PM2_PATH save
